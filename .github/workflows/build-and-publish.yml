name: Build and publish Entware-AdGuardHome repository

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare official AdGuard Home source
        run: ./scripts/prepare-source.sh

      - name: Set up Go from upstream go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: .work/AdGuardHome/go.mod
          cache-dependency-path: .work/AdGuardHome/go.sum

      - name: Build package and repository index
        run: ./scripts/build-repository.sh

      - name: Validate package and index
        run: ./scripts/test-repository.sh

      - name: Upload package as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: entware-adguardhome-${{ github.sha }}
          path: public/aarch64-3.10
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy repository to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
